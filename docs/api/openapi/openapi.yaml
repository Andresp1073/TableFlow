      tags: [Notifications]
      security:
        - BearerAuth: []
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
            format: uuid
          description: Cursor for pagination
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
          description: Max items per page
        - name: branchId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by branch
        - name: type
          in: query
          schema:
            type: string
            enum: [CONFIRMATION, REMINDER, CANCELLATION, MODIFICATION]
