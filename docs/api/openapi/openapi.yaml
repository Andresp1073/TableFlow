      required: [tableNumber, minCapacity, maxCapacity]
      properties:
        tableNumber:
          type: string
          maxLength: 20
        minCapacity:
          type: integer
          minimum: 1
          maximum: 50
        maxCapacity:
          type: integer
          minimum: 1
          maximum: 50
        zoneId:
          type: string
          format: uuid
          nullable: true
        positionX:
          type: integer
          minimum: 0
          default: 0
        positionY:
          type: integer
          minimum: 0
          default: 0
        shape:
          type: string
          enum: [rectangle, round, square, booth]
          default: rectangle
        width:
          type: integer
          minimum: 20
          maximum: 500
          default: 60
        height:
          type: integer
          minimum: 20
          maximum: 500
          default: 60

    UpdateTableRequest:
      type: object
      properties:
        tableNumber:
          type: string
          maxLength: 20
        minCapacity:
          type: integer
          minimum: 1
          maximum: 50
        maxCapacity:
          type: integer
          minimum: 1
          maximum: 50
        zoneId:
          type: string
          format: uuid
          nullable: true
        positionX:
          type: integer
        positionY:
          type: integer
        shape:
          type: string
          enum: [rectangle, round, square, booth]
        width:
          type: integer
          minimum: 20
          maximum: 500
        height:
