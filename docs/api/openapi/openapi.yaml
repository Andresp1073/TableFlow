openapi: "3.1.0"
info:
  title: TableFlow API
  version: "1.0.0"
  description: >
    Enterprise restaurant reservation management API for the TableFlow SaaS platform.
    Manage multi-restaurant organizations, branches, tables, reservations, customers,
    staff, and reporting â€” all through a single RESTful API.
  termsOfService: https://tableflow.com/terms
  contact:
    name: TableFlow Support
    email: support@tableflow.com
    url: https://tableflow.com/support
  license:
    name: Proprietary
    url: https://tableflow.com/license

servers:
  - url: https://api.tableflow.com/api/v1
    description: Production server
  - url: https://staging-api.tableflow.com/api/v1
    description: Staging server
  - url: http://localhost:4000/api/v1
    description: Development server

paths:
  # ============================================================================
  # HEALTH
  # ============================================================================
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      tags: [Health]
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy]
                  timestamp:
                    type: string
                    format: date-time
              example:
                status: healthy
                timestamp: "2026-07-04T10:00:00.000Z"

  # ============================================================================
  # AUTHENTICATION
  # ============================================================================
  /auth/register:
    post:
      summary: Register a new organization and admin user
      operationId: authRegister
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            example:
              email: admin@restaurant.com
              password: SecurePass123!
              firstName: John
              lastName: Doe
              organizationName: La Trattoria Group
              phone: "+14155551234"
      responses:
        "201":
          description: Organization and admin user created
          headers:
            Location:
              schema:
                type: string
                format: uri
              description: URL of the created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                data:
                  id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  email: admin@restaurant.com
                  firstName: John
                  lastName: Doe
                  organizationId: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                  createdAt: "2026-07-04T10:00:00.000Z"
                message: Organization created successfully
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  /auth/login:
    post:
      summary: Authenticate and receive JWT tokens
      operationId: authLogin
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: admin@restaurant.com
              password: SecurePass123!
      responses:
        "200":
          description: Authentication successful
          headers:
            Set-Cookie:
              schema:
                type: string
              description: HTTP-only refresh token cookie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
              example:
                success: true
                data:
                  accessToken: eyJhbGciOiJIUzI1NiIs...
                  refreshToken: dGhpcyBpcyBhIHJlZnJl...
                  expiresIn: 900
                  user:
                    id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    email: admin@restaurant.com
                    firstName: John
                    lastName: Doe
                    role: restaurant_admin
                message: Authentication successful
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  /auth/refresh:
    post:
      summary: Refresh access token using refresh token
      operationId: authRefresh
      tags: [Authentication]
      security: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
            example:
              refreshToken: dGhpcyBpcyBhIHJlZnJl...
      responses:
        "200":
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
              example:
                success: true
                data:
                  accessToken: eyJhbGciOiJIUzI1NiIs...
                  refreshToken: bmV3IHJlZnJlcyB0b2tl...
                  expiresIn: 900
                  user:
                    id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    email: admin@restaurant.com
                    role: restaurant_admin
                message: Token refreshed successfully
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      summary: Revoke the current refresh token
      operationId: authLogout
      tags: [Authentication]
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        "204":
          description: Logout successful (no content)
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/forgot-password:
    post:
      summary: Send password reset email
      operationId: authForgotPassword
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
            example:
              email: admin@restaurant.com
      responses:
        "200":
          description: Reset email sent (always returns 200 to prevent enumeration)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                data: null
                message: If the email exists, a reset link has been sent
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  /auth/reset-password:
    post:
      summary: Reset password using reset token
      operationId: authResetPassword
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:
                  type: string
                  format: uuid
                  description: Reset token received via email
                password:
                  type: string
                  minLength: 12
                  description: New password (min 12 chars, uppercase, lowercase, digit, special)
            example:
              token: "reset-token-uuid"
              password: NewSecurePass123!
      responses:
        "200":
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                data:
                  message: Password successfully reset
                message: Password reset completed
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  /auth/verify-email:
    post:
      summary: Verify email address using verification token
      operationId: authVerifyEmail
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  format: uuid
            example:
              token: "verification-token-uuid"
      responses:
        "200":
          description: Email verified successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/change-password:
    post:
      summary: Change password for authenticated user
      operationId: authChangePassword
      tags: [Authentication]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 12
            example:
              currentPassword: OldPass123!
              newPassword: NewPass456!
      responses:
        "200":
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Current password is incorrect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ============================================================================
  # USERS
  # ============================================================================
  /users:
    get:
      summary: List users in the organization
      operationId: listUsers
      tags: [Users]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/sortBy"
        - $ref: "#/components/parameters/sortDirection"
        - $ref: "#/components/parameters/searchQuery"
        - name: isActive
          in: query
          schema:
            type: boolean
          description: Filter by active status
        - name: roleId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by role
        - name: branchId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by branch assignment
      responses:
        "200":
          description: Paginated list of users
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/User"
                      meta:
                        $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      summary: Create a new staff user
      operationId: createUser
      tags: [Users]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
            example:
              email: newstaff@restaurant.com
              password: TempPass123!
              firstName: Mark
              lastName: Johnson
              phone: "+14155559876"
              roleIds:
                - roleId: "role-uuid"
                  branchId: "branch-uuid"
      responses:
        "201":
          description: User created
          headers:
            Location:
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                success: true
                data:
                  id: "user-uuid"
                  email: newstaff@restaurant.com
                  firstName: Mark
                  lastName: Johnson
                  isActive: true
                  isVerified: false
                  createdAt: "2026-07-04T10:00:00.000Z"
                message: User created successfully
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /users/{id}:
    get:
      summary: Get a single user by ID
      operationId: getUser
      tags: [Users]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/resourceId"
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      summary: Update a user's profile
      operationId: updateUser
      tags: [Users]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/resourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
            example:
              firstName: Marky
              lastName: Johnson-Smith
              phone: "+14155559877"
              isActive: false
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Soft-delete a user account
      operationId: deleteUser
      tags: [Users]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/resourceId"
        - name: permanent
          in: query
          schema:
            type: boolean
          description: Hard delete (admin only)
      responses:
        "204":
          description: User deleted (no content)
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ============================================================================
  # ROLES
  # ============================================================================
  /roles:
    get:
      summary: List all roles
      operationId: listRoles
      tags: [Roles]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of roles with permissions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Role"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      summary: Create a custom role
      operationId: createRole
      tags: [Roles]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoleRequest"
            example:
              name: floor_manager
              description: Manages floor operations
              permissionIds:
                - "perm-uuid-1"
                - "perm-uuid-2"
      responses:
        "201":
          description: Role created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /roles/{id}:
    get:
      summary: Get a single role's details
      operationId: getRole
      tags: [Roles]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/resourceId"
      responses:
        "200":
          description: Role details with permissions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Role"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Replace a role's permissions
      operationId: updateRole
      tags: [Roles]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/resourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoleRequest"
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete a custom role
      operationId: deleteRole
      tags: [Roles]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/resourceId"
      responses:
        "204":
          description: Role deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ============================================================================
  # PERMISSIONS
  # ============================================================================
  /permissions:
    get:
      summary: List all system permissions (read-only catalog)
      operationId: listPermissions
      tags: [Permissions]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Permission catalog
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Permission"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ============================================================================
  # ORGANIZATIONS (RESTAURANTS)
  # ============================================================================
  /organizations:
    get:
      summary: List organizations (system admin only)
      operationId: listOrganizations
      tags: [Restaurants]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/sortBy"
        - $ref: "#/components/parameters/sortDirection"
      responses:
        "200":
          description: Paginated list of organizations
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Organization"
                      meta:
                        $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /organizations/{id}:
    get:
      summary: Get organization details
      operationId: getOrganization
      tags: [Restaurants]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/resourceId"
      responses:
        "200":
          description: Organization details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Organization"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      summary: Update organization settings
      operationId: updateOrganization
      tags: [Restaurants]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/resourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrganizationRequest"
            example:
              name: La Trattoria Group Inc.
              email: contact@latrattoriagroup.com
              phone: "+14155559876"
              address: 456 Oak Ave, New York, NY 10002
              logoUrl: "https://cdn.tableflow.com/logos/new-logo.png"
              timezone: America/New_York
      responses:
        "200":
          description: Organization updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ============================================================================
  # BRANCHES
  # ============================================================================
  /branches:
    get:
      summary: List branches
      operationId: listBranches
      tags: [Branches]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/sortBy"
        - $ref: "#/components/parameters/sortDirection"
        - $ref: "#/components/parameters/searchQuery"
        - name: cuisineType
          in: query
          schema:
            type: string
          description: Filter by cuisine type
        - name: isOnlineReservationEnabled
          in: query
          schema:
            type: boolean
          description: Filter by online booking toggle
      responses:
        "200":
          description: Paginated list of branches
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Branch"
                      meta:
                        $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      summary: Create a new branch
      operationId: createBranch
      tags: [Branches]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBranchRequest"
            example:
              name: La Trattoria Uptown
              address: 789 Park Ave, New York, NY 10021
              phone: "+14155559876"
              email: uptown@latrattoria.com
              timezone: America/New_York
              cuisineType: Italian
              averageDiningDuration: 90
              maxAdvanceBookingDays: 60
              slotInterval: 30
              maxPartySize: 20
              isOnlineReservationEnabled: true
      responses:
        "201":
          description: Branch created
          headers:
            Location:
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /branches/{id}:
    get:
      summary: Get branch details with hours and stats
      operationId: getBranch
      tags: [Branches]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/resourceId"
      responses:
        "200":
          description: Branch details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Branch"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Replace all branch fields
      operationId: replaceBranch
      tags: [Branches]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/resourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBranchRequest"
      responses:
        "200":
          description: Branch replaced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      summary: Partially update a branch
      operationId: updateBranch
      tags: [Branches]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/resourceId"
      requestBody:
