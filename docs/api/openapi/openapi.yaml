              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/AuditLog"
                      meta:
                        type: object
                        properties:
                          limit:
                            type: integer
                          hasMore:
                            type: boolean
                          nextCursor:
                            type: string
                            format: uuid
                          requestId:
                            type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ============================================================================
  # WEBHOOKS
  # ============================================================================
  /webhooks:
    get:
      summary: List webhook subscriptions
      operationId: listWebhooks
      tags: [Webhooks]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of webhook subscriptions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Webhook"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      summary: Create a webhook subscription
      operationId: createWebhook
      tags: [Webhooks]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url, events]
              properties:
                url:
                  type: string
                  format: uri
                events:
                  type: array
                  items:
                    type: string
                isActive:
                  type: boolean
                  default: true
            example:
              url: "https://pos.example.com/webhooks/tableflow"
              events:
                - reservation.created
                - reservation.cancelled
              isActive: true
      responses:
        "201":
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /webhooks/{id}:
    get:
      summary: Get webhook subscription details
      operationId: getWebhook
      tags: [Webhooks]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/resourceId"
      responses:
        "200":
          description: Webhook subscription details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Webhook"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Update a webhook subscription
      operationId: updateWebhook
      tags: [Webhooks]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/resourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  format: uri
                events:
                  type: array
                  items:
                    type: string
                isActive:
                  type: boolean
      responses:
        "200":
          description: Webhook updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete a webhook subscription
      operationId: deleteWebhook
      tags: [Webhooks]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/resourceId"
      responses:
        "204":
          description: Webhook deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /webhooks/{id}/deliveries:
    get:
      summary: List recent delivery attempts for a webhook
      operationId: listWebhookDeliveries
      tags: [Webhooks]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/resourceId"
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            maximum: 50
        - name: cursor
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Delivery attempts
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              format: uuid
                            webhookId:
                              type: string
                              format: uuid
                            status:
                              type: string
                              enum: [SUCCESS, FAILED, DEGRADED]
                            statusCode:
                              type: integer
                            responseBody:
                              type: string
                              nullable: true
                            attemptedAt:
                              type: string
                              format: date-time
                            nextRetryAt:
                              type: string
                              format: date-time
                              nullable: true
                      meta:
                        type: object
                        properties:
                          limit:
                            type: integer
                          hasMore:
                            type: boolean
                          nextCursor:
                            type: string
                            format: uuid
                            nullable: true
                          requestId:
                            type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /webhooks/{id}/test:
    post:
      summary: Send a test webhook event
      operationId: testWebhook
      tags: [Webhooks]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/resourceId"
      responses:
        "200":
          description: Test event sent
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          deliveryId:
                            type: string
                            format: uuid
                          status:
                            type: string
                            enum: [SUCCESS, FAILED]
                          statusCode:
                            type: integer
                          durationMs:
                            type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ============================================================================
  # SEARCH
  # ============================================================================
  /search:
    get:
      summary: Global search across resource types
      operationId: globalSearch
      tags: [Search]
      security:
        - BearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
          description: Search query
        - name: scope
          in: query
          schema:
            type: string
          description: Comma-separated resource types
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
            maximum: 20
          description: Results per scope
      responses:
        "200":
          description: Search results grouped by resource type
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        additionalProperties:
                          type: array
                          items:
                            type: object
                      meta:
                        type: object
                        properties:
                          query:
                            type: string
                          totalResults:
                            type: integer
                          scope:
                            type: array
                            items:
                              type: string
                          requestId:
                            type: string
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

webhooks:
