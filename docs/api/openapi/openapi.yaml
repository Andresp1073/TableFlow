  # ============================================================================
  # RESERVATIONS
  # ============================================================================
  /reservations:
    get:
      summary: List reservations
      operationId: listReservations
      tags: [Reservations]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/sortBy"
        - $ref: "#/components/parameters/sortDirection"
        - $ref: "#/components/parameters/searchQuery"
        - name: branchId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by branch
        - name: customerId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by customer
        - name: date
          in: query
          schema:
            type: string
            format: date
          description: Exact date filter
        - name: gte_date
          in: query
          schema:
            type: string
            format: date
          description: Start date range
        - name: lte_date
          in: query
          schema:
            type: string
            format: date
          description: End date range
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, CONFIRMED, SEATED, COMPLETED, NO_SHOW, CANCELLED]
          description: Filter by status
        - name: in_status
          in: query
          schema:
            type: string
          description: Comma-separated status list
        - name: assignedTo
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by assigned waiter
        - name: isWalkIn
          in: query
          schema:
            type: boolean
          description: Filter walk-ins
      responses:
        "200":
          description: Paginated list of reservations
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Reservation"
                      meta:
                        $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      summary: Create a new reservation
      operationId: createReservation
      tags: [Reservations]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReservationRequest"
            example:
              branchId: "branch-uuid"
              customerId: "customer-uuid"
              date: "2026-07-15"
              time: "19:00:00"
              partySize: 4
              source: PHONE
              specialRequests: Anniversary dinner
              internalNotes: Regular customer
              tableIds:
                - "table-uuid-1"
                - "table-uuid-2"
      responses:
        "201":
          description: Reservation created
          headers:
            Location:
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Reservation"
              example:
                success: true
                data:
                  id: "reservation-uuid"
                  confirmationCode: TF-ABC123
                  branchId: "branch-uuid"
                  customerId: "customer-uuid"
                  date: "2026-07-15"
                  time: "19:00:00"
                  partySize: 4
                  status: CONFIRMED
                  source: PHONE
                  createdAt: "2026-07-04T10:00:00.000Z"
                message: Reservation created successfully
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Table overlap conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Business rule violation (past date, outside hours)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reservations/availability:
    get:
      summary: Find available time slots for a branch on a date
      operationId: getAvailability
      tags: [Reservations]
      security:
        - BearerAuth: []
      parameters:
        - name: branchId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: partySize
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 50
        - name: time
          in: query
          schema:
            type: string
          description: Specific time to check
      responses:
        "200":
          description: Available time slots with table options
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          branchId:
                            type: string
                            format: uuid
                          date:
                            type: string
                            format: date
                          partySize:
                            type: integer
                          slots:
                            type: array
                            items:
                              type: object
                              properties:
                                time:
                                  type: string
                                available:
                                  type: boolean
                                availableTables:
                                  type: array
                                  items:
                                    $ref: "#/components/schemas/RestaurantTable"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
