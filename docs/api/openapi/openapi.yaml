components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token (15-minute expiry). Obtain via POST /auth/login or POST /auth/refresh.

  parameters:
    resourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Resource UUID
    page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
      description: Page number (1-indexed)
    pageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100
        minimum: 1
      description: Items per page
    sortBy:
      name: sortBy
      in: query
      schema:
        type: string
      description: Field to sort by
    sortDirection:
      name: sortDirection
      in: query
      schema:
        type: string
        enum: [ASC, DESC]
        default: DESC
      description: Sort direction
    searchQuery:
      name: q
      in: query
      schema:
        type: string
      description: Search query

  responses:
    Unauthorized:
      description: Authentication required or token expired
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: auth.token.missing
              message: Authentication required
              details: []
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: auth.forbidden
              message: Insufficient permissions to perform this action
              details: []
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: resource.not_found
              message: Resource not found
              details: []
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: validation.failed
              message: Request validation failed
              details:
                - field: email
                  code: validation.email.invalid
                  message: Must be a valid email address
    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: resource.duplicate
              message: Resource already exists
              details: []
    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: internal.error
              message: An unexpected error occurred. Please try again later.
              details: []
    RateLimitExceeded:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: rate_limit.exceeded
              message: Too many requests. Please try again later.
              details:
                retryAfter: 45
                limit: 200
                resetAt: 1704068100

  schemas:
    # ==============================
    # ENVELOPES
    # ==============================
    SuccessResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          nullable: true
        message:
          type: string

    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: object
          required: [code, message, details]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  code:
                    type: string
                  message:
                    type: string
                  value:
                    type: string

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        totalCount:
          type: integer
        totalPages:
          type: integer
        hasNextPage:
          type: boolean
        hasPreviousPage:
          type: boolean
        requestId:
          type: string

    # ==============================
    # AUTH
    # ==============================
    RegisterRequest:
      type: object
      required: [email, password, firstName, lastName, organizationName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 12
        firstName:
          type: string
          maxLength: 100
        lastName:
          type: string
          maxLength: 100
        organizationName:
          type: string
          maxLength: 255
        phone:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshTokenRequest:
      type: object
      properties:
        refreshToken:
          type: string

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            accessToken:
              type: string
            refreshToken:
              type: string
            expiresIn:
              type: integer
            user:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                email:
                  type: string
                  format: email
                firstName:
                  type: string
                lastName:
                  type: string
                role:
                  type: string

    # ==============================
    # USER
    # ==============================
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        isActive:
          type: boolean
        isVerified:
          type: boolean
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
        roles:
          type: array
          items:
            type: object
            properties:
              roleId:
                type: string
                format: uuid
              roleName:
                type: string
              branchId:
                type: string
                format: uuid
                nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateUserRequest:
      type: object
      required: [email, password, firstName, lastName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 12
        firstName:
          type: string
          maxLength: 100
        lastName:
          type: string
          maxLength: 100
        phone:
          type: string
        roleIds:
          type: array
          items:
            type: object
            properties:
              roleId:
                type: string
                format: uuid
              branchId:
                type: string
                format: uuid
                nullable: true

    UpdateUserRequest:
      type: object
      properties:
        firstName:
          type: string
          maxLength: 100
        lastName:
          type: string
          maxLength: 100
        phone:
          type: string
        isActive:
          type: boolean

    # ==============================
    # ROLE
    # ==============================
    Role:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        isSystem:
          type: boolean
        permissions:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateRoleRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 500
        permissionIds:
          type: array
          items:
            type: string
            format: uuid

    # ==============================
    # PERMISSION
    # ==============================
    Permission:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        module:
          type: string
        riskLevel:
          type: string
          enum: [low, medium, high, critical]

    # ==============================
    # ORGANIZATION
    # ==============================
    Organization:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        logoUrl:
          type: string
          format: uri
          nullable: true
        timezone:
          type: string
        branchCount:
          type: integer
        totalStaff:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UpdateOrganizationRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
        phone:
          type: string
        address:
          type: string
        logoUrl:
          type: string
          format: uri
        timezone:
          type: string

    # ==============================
    # BRANCH
    # ==============================
    Branch:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        name:
          type: string
        address:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        timezone:
          type: string
        cuisineType:
          type: string
          nullable: true
        averageDiningDuration:
          type: integer
        maxAdvanceBookingDays:
          type: integer
        slotInterval:
          type: integer
        maxPartySize:
          type: integer
        isOnlineReservationEnabled:
          type: boolean
        tableCount:
          type: integer
        updatedBy:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateBranchRequest:
      type: object
      required: [name, address, timezone]
      properties:
        name:
          type: string
          maxLength: 255
        address:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email
        timezone:
          type: string
        cuisineType:
          type: string
          maxLength: 100
        averageDiningDuration:
          type: integer
          minimum: 30
          maximum: 240
          default: 90
        maxAdvanceBookingDays:
          type: integer
          minimum: 1
          maximum: 365
          default: 60
        slotInterval:
          type: integer
          enum: [15, 30, 60]
          default: 30
        maxPartySize:
          type: integer
          minimum: 1
          maximum: 50
          default: 20
        isOnlineReservationEnabled:
          type: boolean
          default: false

    UpdateBranchRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        address:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email
        timezone:
          type: string
        cuisineType:
          type: string
        averageDiningDuration:
          type: integer
          minimum: 30
          maximum: 240
        maxAdvanceBookingDays:
          type: integer
          minimum: 1
          maximum: 365
        slotInterval:
          type: integer
          enum: [15, 30, 60]
        maxPartySize:
          type: integer
          minimum: 1
          maximum: 50
        isOnlineReservationEnabled:
          type: boolean

    # ==============================
    # BUSINESS / HOLIDAY HOURS
    # ==============================
    BusinessHours:
      type: object
      required: [dayOfWeek, isClosed]
      properties:
        dayOfWeek:
          type: integer
          minimum: 1
          maximum: 7
          description: 1=Monday, 7=Sunday
        openTime:
          type: string
          nullable: true
        closeTime:
          type: string
          nullable: true
        isClosed:
          type: boolean

    HolidayHours:
      type: object
      required: [date, isClosed]
      properties:
        date:
          type: string
          format: date
        openTime:
          type: string
          nullable: true
        closeTime:
          type: string
          nullable: true
        isClosed:
          type: boolean
        description:
          type: string
          maxLength: 255

    # ==============================
    # TABLE
    # ==============================
    RestaurantTable:
      type: object
      properties:
        id:
          type: string
          format: uuid
        branchId:
          type: string
          format: uuid
        zoneId:
          type: string
          format: uuid
          nullable: true
        tableNumber:
          type: string
        minCapacity:
          type: integer
        maxCapacity:
          type: integer
        isActive:
          type: boolean
        positionX:
          type: integer
        positionY:
          type: integer
        shape:
          type: string
          enum: [rectangle, round, square, booth]
        width:
          type: integer
        height:
          type: integer
        zoneName:
          type: string
          nullable: true
        updatedBy:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateTableRequest:
